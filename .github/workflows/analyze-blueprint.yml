name: Analyze Blueprint

on:
  push:
    paths:
      - 'data/input/*.pdf'
  workflow_dispatch:
    inputs:
      pdf_filename:
        description: 'PDF filename in data/input/ (e.g. "MIAR 14 plans.pdf")'
        required: true
        type: string
      pages:
        description: 'Pages to analyze — e.g. "3" or "3-6" or "1,4,9" (leave blank for all pages)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2          # needed so HEAD~1 is available for push diff

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (poppler for pdf2image)
        run: sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine which PDF to analyze
        id: get_pdf
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Normalize: ensure filename ends in .pdf (handles user omitting extension)
            RAW="${{ inputs.pdf_filename }}"
            FILENAME="${RAW%.pdf}.pdf"
            PDF_PATH="data/input/${FILENAME}"
            STEM="${FILENAME%.pdf}"
          else
            # Push trigger: find changed PDF, handle spaces with null-delimiter
            PDF_PATH=$(git diff -z --name-only HEAD~1 HEAD -- 'data/input/*.pdf' \
                        | tr '\0' '\n' | head -1)
            FILENAME=$(basename "${PDF_PATH}")
            STEM="${FILENAME%.pdf}"
          fi

          # Write outputs — quote paths that may contain spaces
          printf 'pdf_path=%s\n' "${PDF_PATH}"  >> "$GITHUB_OUTPUT"
          printf 'pdf_stem=%s\n' "${STEM}"       >> "$GITHUB_OUTPUT"
          printf 'pages=%s\n'    "${{ inputs.pages }}" >> "$GITHUB_OUTPUT"

          echo "Resolved PDF : ${PDF_PATH}"
          echo "Stem         : ${STEM}"
          echo "Pages        : ${{ inputs.pages || '(all)' }}"

      - name: Validate PDF exists
        run: |
          PDF_PATH="${{ steps.get_pdf.outputs.pdf_path }}"
          if [ ! -f "${PDF_PATH}" ]; then
            echo "ERROR: '${PDF_PATH}' not found in repo."
            echo "Files in data/input/:"
            ls -1 "data/input/"
            exit 1
          fi
          echo "✓ Found: ${PDF_PATH}"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PDF_PATH="${{ steps.get_pdf.outputs.pdf_path }}"
          PAGES="${{ steps.get_pdf.outputs.pages }}"
          if [ -n "${PAGES}" ]; then
            python pipeline/main.py "${PDF_PATH}" --pages "${PAGES}"
          else
            python pipeline/main.py "${PDF_PATH}"
          fi

      - name: Resolve output directory name
        id: get_outdir
        run: |
          STEM="${{ steps.get_pdf.outputs.pdf_stem }}"
          PAGES="${{ steps.get_pdf.outputs.pages }}"
          if [ -n "${PAGES}" ]; then
            SAFE=$(printf '%s' "${PAGES}" | tr ',' '_' | tr '-' 'to')
            echo "outdir=data/output/${STEM}_pages${SAFE}" >> "$GITHUB_OUTPUT"
          else
            echo "outdir=data/output/${STEM}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post report to job summary
        if: always()
        run: |
          OUTDIR="${{ steps.get_outdir.outputs.outdir }}"
          REPORT="${OUTDIR}/report.md"
          echo "## 🏗️ Blueprint Analysis: ${{ steps.get_pdf.outputs.pdf_stem }}" >> "$GITHUB_STEP_SUMMARY"
          PAGES="${{ steps.get_pdf.outputs.pages }}"
          if [ -n "${PAGES}" ]; then
            echo "**Pages analyzed:** ${PAGES}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "${REPORT}" ]; then
            cat "${REPORT}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No report generated — check logs above._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/
          PAGES="${{ steps.get_pdf.outputs.pages }}"
          LABEL="${PAGES:-all}"
          git diff --cached --quiet || \
            git commit -m "analysis: ${{ steps.get_pdf.outputs.pdf_stem }} pages[${LABEL}] (run ${{ github.run_number }})"
          git push

      - name: Upload full output as artifact
        uses: actions/upload-artifact@v5
        with:
          name: blueprint-output-run${{ github.run_number }}
          path: ${{ steps.get_outdir.outputs.outdir }}/
          retention-days: 90
